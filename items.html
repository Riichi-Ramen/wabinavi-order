<title>WABI NAVI — 商品表示管理 / Item Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f0e6;--card:#fffcf5;--accent:#c0392b;--text:#2c1810;--muted:#7a6858;
  --green:#2d7a3a;--border:rgba(180,140,110,0.35)}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);
  padding-bottom:110px}
.header{background:rgba(60,30,15,0.95);color:#fff;padding:1rem;text-align:center;
  position:sticky;top:0;z-index:100}
.header h1{font-size:1rem;color:#c8a96e}
.header .sub{font-size:.7rem;opacity:.8;margin-top:.2rem}
.gas-status{font-size:.68rem;margin-top:.3rem;cursor:pointer;text-decoration:underline}
.gas-ok{color:#7ec98a}.gas-ng{color:#f5a3a3}
.toolbar{display:flex;gap:.5rem;padding:.8rem 1rem;flex-wrap:wrap;align-items:center;
  background:rgba(44,24,16,0.06);border-bottom:1px solid var(--border)}
.toolbar input[type=search]{flex:1;min-width:160px;padding:.5rem .8rem;border-radius:20px;
  border:1.5px solid var(--border);font-family:inherit;font-size:.85rem;background:var(--card)}
.stat{font-size:.75rem;color:var(--muted);white-space:nowrap}
.stat b{color:var(--accent)}
.cat-sec{margin:1rem;background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden}
.cat-head{display:flex;align-items:center;justify-content:space-between;gap:.5rem;
  padding:.8rem 1rem;background:rgba(192,57,43,0.07);cursor:pointer}
.cat-head .cname{font-weight:700;font-size:.92rem}
.cat-head .cname small{display:block;font-weight:400;font-size:.68rem;color:var(--muted)}
.cat-btns{display:flex;gap:.4rem}
.mini-btn{font-size:.66rem;padding:.3rem .6rem;border-radius:14px;cursor:pointer;
  border:1px solid var(--border);background:#fff;color:var(--muted);font-family:inherit}
.mini-btn:hover{border-color:var(--accent);color:var(--accent)}
.item-list{display:none}
.cat-sec.open .item-list{display:block}
.item-row{display:flex;align-items:center;gap:.7rem;padding:.55rem 1rem;
  border-top:1px solid rgba(180,140,110,0.15);cursor:pointer}
.item-row:hover{background:rgba(192,57,43,0.04)}
.item-row input{width:19px;height:19px;accent-color:var(--green);flex-shrink:0;cursor:pointer}
.item-row.hidden-item{opacity:.45}
.item-row.hidden-item .iname{text-decoration:line-through}
.iid{font-size:.66rem;color:var(--muted);background:rgba(44,24,16,0.06);
  border-radius:6px;padding:.1rem .4rem;min-width:44px;text-align:center;flex-shrink:0}
.iname{flex:1;font-size:.83rem}
.iprice{font-size:.75rem;color:var(--muted);flex-shrink:0}
.cs-badge{font-size:.6rem;background:#e67e22;color:#fff;border-radius:10px;
  padding:.05rem .4rem;flex-shrink:0}
.savebar{position:fixed;bottom:0;left:0;right:0;background:rgba(60,30,15,0.97);
  padding:.8rem 1rem;display:flex;gap:.6rem;align-items:center;z-index:100;flex-wrap:wrap}
.savebar input{flex:1;min-width:130px;padding:.55rem .8rem;border-radius:8px;
  border:none;font-family:inherit;font-size:.85rem}
.save-btn{background:var(--green);color:#fff;border:none;border-radius:8px;
  padding:.6rem 1.4rem;font-weight:700;cursor:pointer;font-size:.88rem;font-family:inherit}
.save-btn:disabled{opacity:.5}
.save-status{width:100%;text-align:center;font-size:.74rem;color:#c8a96e;min-height:1em}
.loading-overlay{position:fixed;inset:0;background:rgba(247,240,230,0.9);z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.8rem}
.spinner{width:34px;height:34px;border:4px solid rgba(192,57,43,0.2);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <h1>🛠️ 商品表示管理 / Zarządzanie widocznością / Item Manager</h1>
  <div class="sub">チェックを外した商品は注文アプリで非表示になります<br>
    Odznaczone pozycje będą ukryte w aplikacji zamówień</div>
  <div class="gas-status" id="gas-status" onclick="setupGas()">確認中…</div>
</div>

<div class="toolbar">
  <input type="search" id="search" placeholder="🔍 検索 / Szukaj… (nazwa lub ID)" oninput="filterItems()">
  <span class="stat">表示中 <b id="stat-visible">—</b> / 非表示 <b id="stat-hidden">—</b></span>
</div>

<div id="categories"></div>

<div class="savebar">
  <input type="password" id="save-password" placeholder="🔑 係員パスワード / Hasło obsługi">
  <button class="save-btn" id="save-btn" onclick="saveHidden()">💾 保存 / Zapisz</button>
  <div class="save-status" id="save-status"></div>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div style="font-size:.85rem;color:var(--muted)">読み込み中… / Ładowanie…</div>
</div>

// ── GAS URL設定（ステータス表示をタップ） ──
function setupGas() {
  const u = prompt('GAS URL (https://script.google.com/macros/s/…/exec):',
    localStorage.getItem('wabi_gas_url') || '');
  if (u !== null) { localStorage.setItem('wabi_gas_url', u.trim()); location.reload(); }
}

function updateGasStatus(ok, msg) {
  const el = document.getElementById('gas-status');
  el.className = 'gas-status ' + (ok ? 'gas-ok' : 'gas-ng');
  el.textContent = msg + '（タップで変更 / dotknij, aby zmienić）';
}

      <div class="item-list">
        ${cat.items.map(it => `
          <label class="item-row ${hidden.has(it.id)?'hidden-item':''}" id="row-${it.id}">
            <input type="checkbox" ${hidden.has(it.id)?'':'checked'}
              onchange="toggle('${it.id}', this.checked)">
            <span class="iid">${it.id}</span>
            <span class="iname">${it.namePL}</span>
            ${it.cs ? '<span class="cs-badge">準備中</span>' : ''}
            <span class="iprice">${it.price} zł</span>
          </label>`).join('')}
      </div>
    </div>`).join('');
  updateStats();
}

function toggle(id, visible) {
  if (visible) hidden.delete(id); else hidden.add(id);
  const row = document.getElementById('row-' + id);
  if (row) row.classList.toggle('hidden-item', !visible);
  updateStats();
}

function setCat(catId, visible) {
  const cat = MENU.find(c => c.id === catId);
  cat.items.forEach(it => {
    if (visible) hidden.delete(it.id); else hidden.add(it.id);
    const row = document.getElementById('row-' + it.id);
    const chk = row?.querySelector('input');
    if (chk) chk.checked = visible;
    if (row) row.classList.toggle('hidden-item', !visible);
  });
  updateStats();
}

function updateStats() {
  const total = MENU.reduce((a,c) => a + c.items.length, 0);
  document.getElementById('stat-hidden').textContent  = hidden.size;
  document.getElementById('stat-visible').textContent = total - hidden.size;
}

function filterItems() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  MENU.forEach(cat => {
    let any = false;
    cat.items.forEach(it => {
      const row = document.getElementById('row-' + it.id);
      const hit = !q || it.namePL.toLowerCase().includes(q) || it.id.toLowerCase().includes(q);
      row.style.display = hit ? 'flex' : 'none';
      if (hit) any = true;
    });
    document.getElementById('sec-' + cat.id).style.display = any ? 'block' : 'none';
  });
}

// ── 現在の非表示リストをGASから読み込み ──
async function loadHidden() {
  if (!GAS_URL) {
    updateGasStatus(false, '⚠️ GAS URL未設定');
    document.getElementById('loading').style.display = 'none';
    render();
    return;
  }
  try {
    const res = await fetch(GAS_URL + '?action=getHiddenItems');
    const data = await res.json();
    if (data.status === 'ok') {
      hidden = new Set(data.hidden || []);
      updateGasStatus(true, '✅ 接続OK — 現在' + hidden.size + '品が非表示');
    } else {
      updateGasStatus(false, '⚠️ 応答エラー');
    }
  } catch(e) {
    updateGasStatus(false, '⚠️ 接続失敗');
  }
  document.getElementById('loading').style.display = 'none';
  render();
}

// ── 保存 ──
async function saveHidden() {
  const password = document.getElementById('save-password').value;
  const status   = document.getElementById('save-status');
  if (!GAS_URL) { status.textContent = '⚠️ GAS URLを設定してください（上部の状態表示をタップ）'; return; }
  if (!password) { status.textContent = '🔑 パスワードを入力してください / Podaj hasło'; return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; status.textContent = '⏳ 保存中… / Zapisywanie…';
  try {
    const res = await fetch(GAS_URL, {
      method:'POST', mode:'cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'setHiddenItems', password, hidden:[...hidden] })
    });
    const data = await res.json();
    status.textContent = data.status === 'ok'
      ? '✅ ' + data.message + ' — アプリに即反映されます'
      : '❌ ' + (data.message || 'エラー');
  } catch(e) {
    status.textContent = '📡 通信エラー / Błąd połączenia — もう一度お試しください';
  }
  btn.disabled = false;
}

loadHidden();
</script>
